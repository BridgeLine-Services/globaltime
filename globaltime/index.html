    <link rel="preload" href="/fonts/fonts.css" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="/fonts/fonts.css" /></noscript>

    <link rel="dns-prefetch" href="//pagead2.googlesyndication.com" />

    <!-- Structured Data: WebSite + SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "World Clock",
      "alternateName": ["WorldClock.live", "GlobalTime"],
      "description": "Real-time world clock with live times for every country on Earth. Free interactive 3D globe, timezone explorer, mini-games, and country information.",
      "url": "https://globaltime-pi.vercel.app",
      "inLanguage": "en-US",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://globaltime-pi.vercel.app/time/{search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "World Clock",
      "url": "https://globaltime-pi.vercel.app",
      "logo": {
        "@type": "ImageObject",
        "url": "https://globaltime-pi.vercel.app/favicon-512.png",

      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",

      },
      "sameAs": []
    }
    </script>

    <!-- Google Translate (lazy — deferred so it never blocks render) -->
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          autoDisplay: false,
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE
        }, 'google_translate_element');
      }
    </script>
    <script defer type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <style>
      /* Prevent Google Translate from pushing layout */
      .goog-te-banner-frame { display: none !important; }
      body { top: 0 !important; }
      .skiptranslate { display: none !important; }
      #google_translate_element { display: none !important; }
      /* Font-display: swap is set in fonts.css — no FOIT */
    </style>
    <!-- Skip-to-content link CSS (accessibility) -->
    <style>
      .skip-link {
        position: absolute;
        top: -100%;
        left: 0;
        background: #00d4ff;
        color: #0a0a1a;
        padding: 0.5rem 1rem;
        font-weight: 700;
        font-size: 0.875rem;
        z-index: 9999;
        border-radius: 0 0 0.5rem 0;
        text-decoration: none;
        transition: top 0.1s;
      }
      .skip-link:focus { top: 0; }
    </style>

  <body>
    <!-- Skip to main content (accessibility) -->
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Google AdSense: loaded after page content to avoid render-blocking -->
    <script>
      window.addEventListener('load', function() {
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1924565904520635';
        s.crossOrigin = 'anonymous';
        s.setAttribute('fetchpriority', 'low');
        document.body.appendChild(s);
      });
