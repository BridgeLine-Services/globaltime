<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a1a" />

    <!-- Primary SEO -->
    <title>WorldClock.live — Real-Time World Clock for Every Country</title>
    <meta name="description" content="See the exact current time in every country on Earth — live, down to the millisecond. Interactive 3D globe, timezone explorer, and 150+ countries. Free, no signup." />
    <meta name="keywords" content="world clock, current time, time zone, timezone, international time, live clock, what time is it, world time, UTC offset" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://globaltime-pi.vercel.app/" />

    <!-- Google AdSense -->
    <meta name="google-adsense-account" content="ca-pub-1924565904520635" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1924565904520635" crossorigin="anonymous"></script>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="WorldClock.live" />
    <meta property="og:title" content="WorldClock.live — Real-Time World Clock for Every Country" />
    <meta property="og:description" content="See the exact current time in every country on Earth — live, down to the millisecond. Interactive 3D globe, 150+ countries, free." />
    <meta property="og:url" content="https://globaltime-pi.vercel.app/" />

    <meta property="og:image:alt" content="WorldClock.live — Real-Time World Clock" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@worldclocklive" />
    <meta name="twitter:title" content="WorldClock.live — Real-Time World Clock for Every Country" />
    <meta name="twitter:description" content="Live time for every country on Earth. Millisecond precision, interactive 3D globe, 150+ countries." />
    <meta name="twitter:image" content="https://globaltime-pi.vercel.app/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Structured Data: WebSite + SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "WorldClock.live",
      "alternateName": "World Clock Live",
      "description": "Real-time world clock with millisecond precision for every country on Earth. Free, interactive 3D globe and timezone explorer.",
      "url": "https://globaltime-pi.vercel.app",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://globaltime-pi.vercel.app/time/{search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "WorldClock.live",
      "url": "https://globaltime-pi.vercel.app",
      "logo": "https://globaltime-pi.vercel.app/favicon.svg",
      "sameAs": []
    }
    </script>
  
    <!-- Google Translate -->
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
